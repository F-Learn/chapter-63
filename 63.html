<script>
    // Chapter 63: Management of Patients with Neurologic Trauma – 40 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. The emergency room (ER) nurse is caring for a client who has been brought in by ambulance after sustaining a fall at home. What physical assessment finding(s) are suggestive of a basilar skull fracture? Select all that apply",
            options: [
                "A. Epistaxis",
                "B. Swelling of the tongue and lips",
                "C. Bruising over the mastoid",
                "D. Unilateral facial numbness",
                "E. Severe back pain"
            ],
            correct: [0,2], // A, C
            rationale: "Fractures of the base of the skull tend to traverse the paranasal sinus of the frontal bone or the middle ear located in the temporal bone. Therefore, they frequently produce hemorrhage from the nose (epistaxis), pharynx, or ears, and blood may appear under the conjunctiva. An area of ecchymosis (bruising) may be seen over the mastoid (Battle sign). Pain is usually localized to the area of injury and swelling of the tongue and lips may have been the result of direct impact of the face due to the fall or an anaphylactic reaction of some type. Numbness on one side of the face is not a typical finding in basilar skull fractures. (PTS:1 REF:p.2057)"
        },
        {
            id: 2,
            question: "2. A client is brought to the trauma center by ambulance after sustaining a high cervical spinal cord injury 1½ hours ago. Endotracheal intubation has been deemed necessary and the nurse is preparing to assist. What nursing diagnosis should the nurse associate with this procedure?",
            options: [
                "A. Risk for impaired skin integrity",
                "B. Risk for injury",
                "C. Risk for autonomic dysreflexia",
                "D. Risk for suffocation"
            ],
            correct: 1, // B
            rationale: "If endotracheal intubation is necessary, extreme care is taken to avoid flexing or extending the client's neck, which can result in extension of a cervical injury. Intubation does not directly cause autonomic dysreflexia and the threat to skin integrity is not a primary concern. Intubation does not carry the potential to cause suffocation. (PTS:1 REF:p.2077)"
        },
        {
            id: 3,
            question: "3. A nurse is caring for a critically ill client with autonomic dysreflexia. What clinical manifestations would the nurse expect in this client?",
            options: [
                "A. Respiratory distress and projectile vomiting",
                "B. Bradycardia and hypertension",
                "C. Tachycardia and agitation",
                "D. Third-spacing and hyperthermia"
            ],
            correct: 1, // B
            rationale: "Autonomic dysreflexia is characterized by a pounding headache, profuse sweating, nasal congestion, piloerection ('goose bumps'), bradycardia, and hypertension. It occurs in cord lesions above T6 after spinal shock has resolved; it does not result in vomiting, tachycardia, or third-spacing. (PTS:1 REF:p.2078)"
        },
        {
            id: 4,
            question: "4. The nurse is caring for a client with increased intracranial pressure (ICP) caused by a traumatic brain injury. Which of the following clinical manifestations would suggest that the client may be experiencing increased brain compression causing brain stem damage?",
            options: [
                "A. Hyperthermia",
                "B. Tachycardia",
                "C. Hypertension",
                "D. Bradypnea"
            ],
            correct: 0, // A
            rationale: "Signs of increasing ICP include slowing of the heart rate (bradycardia), increasing systolic BP, and widening pulse pressure. As brain compression increases, respirations become rapid, BP may decrease, and the pulse slows further. A rapid rise in body temperature is regarded as unfavorable. Hyperthermia increases the metabolic demands of the brain and may indicate brain stem damage. (PTS:1 REF:p.2065)"
        },
        {
            id: 5,
            question: "5. A client is brought to the ED by family after falling off the roof. The care team suspects an epidural hematoma, prompting the nurse to anticipate for which priority intervention?",
            options: [
                "A. Insertion of an intracranial monitoring device",
                "B. Treatment with antihypertensives",
                "C. Making openings in the skull",
                "D. Administration of anticoagulant therapy"
            ],
            correct: 2, // C
            rationale: "An epidural hematoma is considered an extreme emergency. Marked neurologic deficit or respiratory arrest can occur within minutes. Treatment consists of making an opening through the skull to decrease ICP emergently, remove the clot, and control the bleeding. Antihypertensive medications would not be a priority. Anticoagulant therapy should not be prescribed for a client who has a cranial bleed. This could further increase bleeding activity. Insertion of an intracranial monitoring device may be done during the surgery, but is not priority for this client. (PTS:1 REF:p.2059)"
        },
        {
            id: 6,
            question: "6. The staff educator is precepting a nurse new to the critical care unit when a client with a T2 spinal cord injury is admitted. The client is soon exhibiting manifestations of neurogenic shock. In addition to monitoring the client closely, what would be the nurse's most appropriate action?",
            options: [
                "A. Prepare to transfuse packed red blood cells.",
                "B. Prepare for interventions to increase the client's BP.",
                "C. Place the client in the Trendelenburg position.",
                "D. Prepare an ice bath to lower core body temperature."
            ],
            correct: 1, // B
            rationale: "Manifestations of neurogenic shock include decreased BP and heart rate. Cardiac markers would be expected to rise in cardiogenic shock. Transfusion, repositioning, and ice baths are not indicated interventions. (PTS:1 REF:p.2076)"
        },
        {
            id: 7,
            question: "7. An ED nurse has just received a call from EMS that they are transporting a 17-year-old client who has just sustained a spinal cord injury (SCI). The nurse recognizes that the most common cause of this type of injury is what event?",
            options: [
                "A. Syncope (fainting)",
                "B. Suicide attempts",
                "C. Workplace injuries",
                "D. Motor vehicle accidents"
            ],
            correct: 3, // D
            rationale: "The most common causes of SCIs are motor vehicle crashes, falls, violence, and sports. (PTS:1 REF:p.2070)"
        },
        {
            id: 8,
            question: "8. A nurse has a client with a spinal cord injury and is tailoring their care plan to prevent the major causes of death for this client. The nurse's care plan includes assisted coughing techniques, a sequential compression device, and prevention of pressure injuries. Which are the most likely possible causes of death for this client?",
            options: [
                "A. Pneumonia, pulmonary embolism, and sepsis",
                "B. Cardiac tamponade, hypoxia, and malnutrition",
                "C. Oxygen toxicity in paralytic ileus and electrolyte imbalances",
                "D. Seizures, osteomyelitis, and urinary tract infections"
            ],
            correct: 0, // A
            rationale: "The nurse is assisting the client with assisted coughing to prevent pneumonia. Pulmonary infections are managed and prevented by frequent coughing, turning, and deep breathing exercises and chest physiotherapy; aggressive respiratory care and suctioning of the airway if a tracheostomy is present; assisted coughing as needed; and adequate hydration. Low-dose anticoagulation therapy usually is initiated to prevent DVT (deep vein thrombosis) and PE (pulmonary embolism), along with the use of anti-embolism stockings or sequential pneumatic compression devices (SCDs). Pressure injuries have the potential complication of sepsis, osteomyelitis, and fistulas. All of the other listed causes may occur in clients with SCI but are not the main causes of death. The interventions discussed above directly assist in the prevention of pneumonia, pulmonary embolism osteomyelitis and sepsis. (PTS:1 REF:p.2070)"
        },
        {
            id: 9,
            question: "9. Paramedics have brought an intubated client to the RD following a head injury due to acceleration-deceleration motor vehicle accident. Increased ICP is suspected. Appropriate nursing interventions would include which of the following?",
            options: [
                "A. Keep the head of the bed (HOB) flat at all times.",
                "B. Teach the client to perform the Valsalva maneuver.",
                "C. Administer benzodiazepines on a PRN basis.",
                "D. Perform endotracheal suctioning every hour."
            ],
            correct: 2, // C
            rationale: "If the client with a brain injury is very agitated, benzodiazepines are the most commonly used sedatives and do not affect cerebral blood flow or ICP. The HOB should be elevated 30 degrees. Suctioning should be done on a limited basis, due to increasing pressure in the cranium. The Valsalva maneuver is to be avoided. This also causes increased ICP. (PTS:1 REF:p.2060)"
        },
        {
            id: 10,
            question: "10. A client who has sustained a nondepressed skull fracture is admitted to the acute medical unit. Nursing care should include which of the following?",
            options: [
                "A. Preparation for emergency craniotomy",
                "B. Watchful waiting and close monitoring",
                "C. Administration of inotropic drugs",
                "D. Fluid resuscitation"
            ],
            correct: 1, // B
            rationale: "Nondepressed skull fractures generally do not require surgical treatment; however, close observation of the client is essential. A craniotomy would not likely be needed if the fracture is nondepressed. Even if treatment is warranted, it is unlikely to include inotropes or fluid resuscitation. (PTS:1 REF:p.2057)"
        },
        {
            id: 11,
            question: "11. A client who suffered a spinal cord injury is experiencing an exaggerated autonomic response. What aspect of the client's current health status is most likely to have precipitated this event?",
            options: [
                "A. The client received a blood transfusion.",
                "B. The client's analgesia regimen was recently changed.",
                "C. The client was not repositioned during the night shift.",
                "D. The client's urinary catheter became occluded."
            ],
            correct: 3, // D
            rationale: "A distended bladder is the most common cause of autonomic dysreflexia. Infrequent positioning is a less likely cause, although pressure ulcers or tactile stimulation can cause it. Changes in medications or blood transfusions are unlikely causes. (PTS:1 REF:p.2078)"
        },
        {
            id: 12,
            question: "12. A 35-year-old client is being admitted to the intensive care unit (ICU) for increased observation with a brain injury and is awake, alert, and disoriented to time and situation. The client sustained a fall from a roof, and x-rays are pending. The nurse would anticipate which supportive priority measures for this client?",
            options: [
                "A. Seizure prophylaxis and prevention",
                "B. Cervical and spinal immobilization",
                "C. Fluid and electrolyte maintenance,",
                "D. Intubation and mechanical ventilation"
            ],
            correct: 1, // B
            rationale: "Any client with a head injury is presumed to have a cervical spine injury until proven otherwise. The client is transported from the scene of the injury on a board with the head and neck maintained in alignment with the axis of the body. A cervical collar should be applied and maintained until cervical spine x-rays have been obtained and the absence of cervical SCI (spinal cord injury) documented. This client's x-rays were pending so spinal precautions should be maintained and are the priority. Primary injury to the brain is defined as the consequence of direct contact to the head/brain during the instant of initial injury, causing extracranial focal injuries. The greatest opportunity for decreasing TBI (traumatic brain injury) is the implementation of prevention strategies. Treatment for clients with suspected increased intracranial pressure (ICP) also includes ventilator support, seizure prevention, fluid and electrolyte maintenance, nutritional support, and management of pain and anxiety. Clients who are comatose are intubated and mechanically ventilated to ensure adequate oxygenation and to protect their airway. No information was provided on current ICP. The client was not fully orientated so he/she was transferred to the ICU for closer monitoring. (PTS:1 REF:p.2060)"
        },
        {
            id: 13,
            question: "13. A client with a head injury has been increasingly agitated and the nurse has consequently identified a risk for injury. What is the nurse's best intervention for preventing injury?",
            options: [
                "A. Restrain the client as ordered.",
                "B. Administer opioids PRN as prescribed.",
                "C. Arrange for friends and family members to sit with the client.",
                "D. Pad the side rails of the client's bed."
            ],
            correct: 3, // D
            rationale: "To protect the client from self-injury, the nurse uses padded side rails. The nurse should avoid restraints, because straining against them can increase ICP or cause other injury. Narcotics used to control restless clients should be avoided because these medications can depress respiration, constrict the pupils, and alter the client's responsiveness. Visitors should be limited if the client is agitated. (PTS:1 REF:p.2065)"
        },
        {
            id: 14,
            question: "14. A client with a C5 spinal cord injury has tetraplegia. After being moved out of the ICU, the client reports a severe throbbing headache. What should the nurse do first?",
            options: [
                "A. Check the client's indwelling urinary catheter for kinks to ensure patency.",
                "B. Lower the HOB to improve perfusion.",
                "C. Administer PRN analgesia as prescribed.",
                "D. Reassure the client that headaches are expected during recovery from spinal cord injuries."
            ],
            correct: 0, // A
            rationale: "A severe throbbing headache is a common symptom of autonomic dysreflexia, which occurs after injuries to the spinal cord above T6. The syndrome is usually brought on by sympathetic stimulation, such as bowel and bladder distention. Lowering the HOB can increase ICP. Before administering analgesia, the nurse should check the client's catheter, record vital signs, and perform an abdominal assessment. A severe throbbing headache is a dangerous symptom in this client and is not expected. (PTS:1 REF:p.2057)"
        },
        {
            id: 15,
            question: "15. A client is admitted to the neurologic ICU with a spinal cord injury. When assessing the client the nurse notes there is a sudden depression of reflex activity in the spinal cord below the level of injury. What should the nurse suspect?",
            options: [
                "A. Epidural hemorrhage",
                "B. Hypertensive emergency",
                "C. Spinal shock",
                "D. Hypovolemia"
            ],
            correct: 2, // C
            rationale: "In spinal shock, the reflexes are absent, BP and heart rate fall, and respiratory failure can occur. Hypovolemia, hemorrhage, and hypertension do not cause this sudden change in neurologic function. (PTS:1 REF:p.2075)"
        },
        {
            id: 16,
            question: "16. A client sustained a head injury as a result of trauma. The health care provider has instituted seizure prophylactic measures. The nurse anticipates which specific measures being initiated for this client?",
            options: [
                "A. Antiemetic medications on day three of injury",
                "B. Aspiration precautions on day four of injury",
                "C. Intubation and ventilator support on day one of injury",
                "D. Anticonvulsant medications on day two of injury"

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
